apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpor
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://kusionstack.github.io/charts
      chart: karpor
      targetRevision: 0.7.6
      helm:
        valueFiles:
          - $values/karpor/values.yml
    - repoURL: https://github.com/iamenr0s/gitops-argocd.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/iamenr0s/gitops-argocd.git
      path: karpor
      targetRevision: main
      kustomize: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: karpor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - Replace=true